services:
  - type: web
    name: tianji-300-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements-marketdata.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: MARKET_DATA_PROVIDER
        value: akshare
      - key: MARKET_DATA_FALLBACK_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: https://tianji-300-quant-research.qijinhou666.chatgpt.site
      - key: WATCHLIST_FILE
        value: /tmp/tianji-watchlist.json
      - key: TRADING_ENABLED
        value: "false"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: REQUEST_RETRIES
        value: "2"
      - key: WEBSOCKET_INTERVAL_SECONDS
        value: "3"
